# Parametri globali base del progetto (CLI e gestione risorse)
run:
  steps: 2000000
  n_envs: 4 # OTTIMIZZATO PER M1

# Iperparametri dell'agente (Reinforcement Learning)
training:
  learning_rate: 0.0002
  n_steps: 2048 # OTTIMIZZATO PER M1
  batch_size: 512 # OTTIMIZZATO PER M1
  n_epochs: 10
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.01
  net_arch: [ 256, 256 ] # Architettura della MlpPolicy espansa
  frame_stack: 4 # Numero di frame impilati come memoria temporale

  # Condizioni per fermare prematuramente il training
  success_window_size: 100 # Quanti episodi recenti analizzare
  success_threshold_pct: 0.95 # OTTIMIZZATO: Abbassata al 95%

# Costanti del simulatore navale
physics:
  max_rudder_delta_per_step: 0.25 # Gradi idraulici massimi per singolo input
  foiling_inertia: 0.98 # Momentum mantenuto in area (volando)
  displacement_inertia: 0.85 # Momentum mantenuto nell'acqua (spanciando)
