# Parametri globali base del progetto (CLI e gestione risorse)
run:
  steps: 2000000
  n_envs: 16

# Iperparametri dell'agente (Reinforcement Learning)
training:
  learning_rate: 0.0002
  n_steps: 4096
  batch_size: 1024
  n_epochs: 10
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.01
  net_arch: [ 256, 256 ]
  frame_stack: 4

  # Condizioni per fermare prematuramente il training
  success_window_size: 100
  success_threshold_pct: 0.95

# Costanti del simulatore navale
physics:
  max_rudder_delta_per_step: 0.25
  foiling_inertia: 0.98 # Momentum mantenuto in area (volando)
  displacement_inertia: 0.85 # Momentum mantenuto nell'acqua (spanciando)
